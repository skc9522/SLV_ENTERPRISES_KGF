<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- ✅ SEO Optimized -->
    <title>SLV Enterprises - KGF</title>
    <meta
      name="description"
      content="SLV Enterprises KGF - Trusted FMCG Distributor and Supplier in Karnataka. Wholesale distribution and reliable service."
    />
    <meta
      name="keywords"
      content="SLV Enterprises, KGF, FMCG Distributor, Wholesale, Karnataka, Supplier"
    />
    <meta name="robots" content="index, follow" />

    <!-- ✅ Google Search Console Verification -->
    <!-- Replace the xxxxxxxx with your actual code from Google Search Console -->
    <meta name="google-site-verification" content="xxxxxxxxxxxxxxxx" />

    <!-- Apple & Manifest -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <!-- Netlify scans this at deploy so the "contact" form is registered (CRA bundle has no form in index.html). -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <noscript> need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
