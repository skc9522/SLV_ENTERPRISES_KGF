<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ SEO Optimized -->
    <title>SLV Enterprises - KGF</title>
    <meta
      name="description"
      content="SLV Enterprises KGF - Trusted FMCG Distributor and Supplier in Karnataka. Wholesale distribution and reliable service."
    />
    <meta
      name="keywords"
      content="SLV Enterprises, KGF, FMCG Distributor, Wholesale, Karnataka, Supplier"
    />
    <meta name="robots" content="index, follow" />

    <!-- ✅ Google Search Console Verification -->
    <!-- Replace the xxxxxxxx with your actual code from Google Search Console -->
    <meta name="google-site-verification" content="xxxxxxxxxxxxxxxx" />

    <!-- Apple & Manifest -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <!-- Netlify parses this HTML at build/deploy to register the "contact" form (must match fields in App.js). -->
    <form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <noscript>you need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
